version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: specimencheckin
      POSTGRES_USER: scuser
      POSTGRES_PASSWORD: scpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scuser -d specimencheckin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/SpecimenCheckin
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=specimencheckin;Username=scuser;Password=scpass
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/specimen-check-in
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
